<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Seashell Studio</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <!-- Core styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-primary: var(--surface, #131313);
            --text-primary: var(--on-surface, #e5e2e1);
            --text-secondary: var(--on-surface-variant, #dac2b2);
            --bg-card: rgba(42, 42, 42, 0.4);
            --border-light: rgba(255, 255, 255, 0.08);
            --secondary: var(--primary-container, #ff9f4a);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100svh;
            height: 100%;
            margin: 0;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        .thank-you-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 2rem;
            padding: 4rem 2rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s ease-out;
        }

        .thank-you-icon {
            font-size: 5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        .thank-you-title {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .thank-you-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .return-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            font-family: 'Plus Jakarta Sans', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .return-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Abstract Background Elements */
        .bg-blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            border-radius: 50%;
            opacity: 0.4;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -200px;
            right: -100px;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .thank-you-container {
                padding: 2.75rem 1.25rem;
                border-radius: 1.5rem;
            }

            .thank-you-title {
                font-size: clamp(2.4rem, 13vw, 3rem);
            }

            .thank-you-subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }

            .return-btn {
                width: 100%;
                justify-content: center;
                min-height: 3.25rem;
                padding: 0.95rem 1.25rem;
            }

            .blob-1,
            .blob-2 {
                width: 260px;
                height: 260px;
                filter: blur(70px);
            }

            .blob-1 {
                top: -60px;
                left: -80px;
            }

            .blob-2 {
                right: -70px;
                bottom: -90px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    
    <div class="thank-you-container">
        <span class="material-symbols-outlined thank-you-icon">check_circle</span>
        <h1 class="thank-you-title text-gradient">Thank You</h1>
        <p class="thank-you-subtitle">Your onboarding submission was successfully received.<br>We will review your details and prepare your proposal shortly.</p>
        <a href="index.html" class="return-btn">
            <span class="material-symbols-outlined" style="font-size: 1.25rem;">arrow_back</span>
            Return to Home
        </a>
    </div>
</body>
</html>
