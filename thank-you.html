<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Seashell Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --thanks-bg: #090a0d;
            --thanks-text: #f7f0ea;
            --thanks-text-soft: rgba(247, 240, 234, 0.72);
            --thanks-text-dim: rgba(247, 240, 234, 0.58);
            --thanks-accent: var(--primary-container, #ff9f4a);
            --thanks-accent-soft: var(--primary, #ffc69a);
            --thanks-line: rgba(255, 255, 255, 0.08);
            --thanks-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
            --thanks-display: "Cormorant Garamond", serif;
            --thanks-body: "Manrope", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            padding: 1rem;
            background:
                radial-gradient(circle at top left, rgba(255, 159, 74, 0.14), transparent 20%),
                linear-gradient(180deg, rgba(13, 16, 24, 0.98), rgba(8, 10, 14, 1));
            color: var(--thanks-text);
            font-family: var(--thanks-body);
            overflow: hidden;
        }

        .thanks-shell {
            width: min(42rem, 100%);
            padding: clamp(1.4rem, 4vw, 2.6rem);
            border-radius: 2rem;
            background: linear-gradient(180deg, rgba(18, 22, 30, 0.92), rgba(12, 15, 21, 0.84));
            border: 1px solid var(--thanks-line);
            box-shadow: var(--thanks-shadow);
        }

        .thanks-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.4rem;
        }

        .thanks-logo {
            width: 4.1rem;
            height: 4.1rem;
            object-fit: contain;
        }

        .thanks-kicker,
        .thanks-card-label {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.76rem;
            color: var(--thanks-accent-soft);
        }

        .thanks-kicker {
            margin: 0;
        }

        .thanks-title {
            margin: 0.3rem 0 0.55rem;
            font-family: var(--thanks-display);
            font-size: clamp(2.6rem, 8vw, 4.4rem);
            line-height: 0.92;
            letter-spacing: -0.04em;
        }

        .thanks-body {
            margin: 0;
            color: var(--thanks-text-soft);
            line-height: 1.7;
            max-width: 42ch;
        }

        .thanks-summary {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .thanks-card {
            padding: 0.95rem 1rem;
            border-radius: 1.2rem;
            border: 1px solid var(--thanks-line);
            background: rgba(255, 255, 255, 0.04);
        }

        .thanks-card-label {
            display: block;
            margin-bottom: 0.35rem;
        }

        .thanks-card-value {
            color: var(--thanks-text-soft);
            line-height: 1.55;
        }

        .thanks-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .thanks-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3rem;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.22s ease, background-color 0.22s ease, border-color 0.22s ease;
        }

        .thanks-action:hover {
            transform: translateY(-1px);
        }

        .thanks-action-primary {
            background: linear-gradient(135deg, rgba(255, 159, 74, 0.96), rgba(255, 198, 154, 0.96));
            color: #201108;
            box-shadow: 0 18px 34px rgba(255, 159, 74, 0.22);
        }

        .thanks-action-secondary {
            color: var(--thanks-text);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        @media (max-width: 640px) {
            .thanks-summary {
                grid-template-columns: 1fr;
            }

            .thanks-actions {
                display: grid;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="thanks-shell">
        <div class="thanks-top">
            <img src="assets/Seashell Logo.png" alt="Seashell Studio logo" class="thanks-logo">
            <div>
                <p class="thanks-kicker">Submission received</p>
                <h1 class="thanks-title">Thank you.</h1>
            </div>
        </div>

        <p class="thanks-body" id="thanksBody">Your onboarding submission was successfully received. We will use your selections to shape the first direction for your website.</p>
        <section class="thanks-summary" id="thanksSummary" aria-label="Submission summary"></section>
        <div class="thanks-actions">
            <a class="thanks-action thanks-action-primary" href="index.html">Return Home</a>
            <a class="thanks-action thanks-action-secondary" href="index.html">Start Another Intake</a>
        </div>
    </main>

    <script>
        const THANK_YOU_SUMMARY_STORAGE_KEY = 'seashellStudioThankYouSummary';
        const summaryRoot = document.getElementById('thanksSummary');
        const bodyCopy = document.getElementById('thanksBody');
        const raw = window.sessionStorage.getItem(THANK_YOU_SUMMARY_STORAGE_KEY);

        if (raw) {
            try {
                const summary = JSON.parse(raw);
                const cards = [
                    ['Business', summary.form?.businessName || 'Your project'],
                    ['Palette', summary.palette || 'Not specified'],
                    ['Typography', summary.font || 'Not specified'],
                    ['Timeline', summary.timeline || 'Not specified'],
                    ['Sections', Array.isArray(summary.sections) && summary.sections.length ? summary.sections.join(', ') : 'Not specified'],
                    ['Features', Array.isArray(summary.features) && summary.features.length ? summary.features.join(', ') : 'No optional features selected']
                ];

                if (summary.form?.businessName) {
                    bodyCopy.textContent = `Thanks, ${summary.form.businessName}. Your intake has been captured and the Seashell Studio direction is ready for review.`;
                }

                summaryRoot.innerHTML = cards.map(([label, value]) => `
                    <article class="thanks-card">
                        <span class="thanks-card-label">${label}</span>
                        <span class="thanks-card-value">${value}</span>
                    </article>
                `).join('');
            } catch (error) {
                summaryRoot.innerHTML = `
                    <article class="thanks-card">
                        <span class="thanks-card-label">Status</span>
                        <span class="thanks-card-value">Submission received.</span>
                    </article>
                `;
            }
        } else {
            summaryRoot.innerHTML = `
                <article class="thanks-card">
                    <span class="thanks-card-label">Status</span>
                    <span class="thanks-card-value">Submission received.</span>
                </article>
            `;
        }
    </script>
</body>
</html>
